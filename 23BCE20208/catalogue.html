<!DOCTYPE html>
<html>
<head>
    <title>Catalogue - BookStream</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #fff; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #2c3e50; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .btn-buy { background: #e67e22; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
        .nav-back { text-decoration: none; color: #3498db; font-weight: bold; }
    </style>
</head>
<body>
    <a href="home.html" class="nav-back">← Back to Home</a>
    <h2>Book Catalogue</h2>
    <table>
        <thead>
            <tr>
                | Book Title | Author | Price | Action |
            </tr>
        </thead>
        <tbody id="bookList">
            <tr>
                <td>The Great Gatsby</td>
                <td>F. Scott Fitzgerald</td>
                <td>$12.99</td>
                <td><button class="btn-buy" onclick="addToCart('The Great Gatsby')">Add to Cart</button></td>
            </tr>
            <tr>
                <td>1984</td>
                <td>George Orwell</td>
                <td>$10.50</td>
                <td><button class="btn-buy" onclick="addToCart('1984')">Add to Cart</button></td>
            </tr>
            <tr>
                <td>The Hobbit</td>
                <td>J.R.R. Tolkien</td>
                <td>$15.00</td>
                <td><button class="btn-buy" onclick="addToCart('The Hobbit')">Add to Cart</button></td>
            </tr>
        </tbody>
    </table>
    <script>
        function addToCart(book) {
            alert(book + " has been added to your cart!");
        }
    </script>
</body>
</html>
