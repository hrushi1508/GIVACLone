<!DOCTYPE html>
<html>
<head>
    <title>BookStream - Home</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        /* Top Frame */
        header { background: #2c3e50; color: white; padding: 20px; text-align: center; height: 60px; }
        /* Layout for Sidebar and Main Content */
        .container { display: flex; flex: 1; }
        /* Left Frame */
        nav { width: 200px; background: #ecf0f1; padding: 20px; border-right: 1px solid #bdc3c7; }
        nav a { display: block; padding: 10px; color: #2c3e50; text-decoration: none; font-weight: bold; }
        nav a:hover { background: #dcdde1; }
        /* Main Frame */
        main { flex: 1; padding: 40px; background: #fff; }
        .hero { background: #3498db; color: white; padding: 40px; border-radius: 8px; text-align: center; }
    </style>
</head>
<body>
    <header>
        <h1>BookStream Online Store</h1>
    </header>
    <div class="container">
        <nav>
            <a href="home.html">Home</a>
            <a href="login.html">Login</a>
            <a href="catalogue.html">Catalogue</a>
            <a href="registration.html">Register</a>
        </nav>
        <main>
            <div class="hero">
                <h2>Welcome to the World of Stories</h2>
                <p>Discover thousands of books at your fingertips.</p>
                <button onclick="goToCatalogue()" style="padding:10px 20px; cursor:pointer;">Browse Now</button>
            </div>
        </main>
    </div>
    <script>
        function goToCatalogue() {
            window.location.href = "catalogue.html";
        }
    </script>
</body>
</html>
